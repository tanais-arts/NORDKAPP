<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NORDKAPP</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── ROTATE OVERLAY ── -->
  <div id="rotate-overlay">
    <div id="rotate-content">
      <div id="rotate-icon">⟳</div>
      <div id="rotate-msg">Tournez votre appareil</div>
      <div id="rotate-sub">Ce site est optimisé en mode paysage</div>
    </div>
  </div>

  <div id="map"></div>

  <!-- ── PHOTO BAR ── -->
  <div id="photo-bar">
    <button class="carousel-arrow" id="carousel-prev">&#8249;</button>
    <div id="photo-carousel"></div>
    <button class="carousel-arrow" id="carousel-next">&#8249;</button>
  </div>

  <header id="title-bar">
    <div id="title-main">NORDKAPP</div>
    <div id="title-sub">17 juin — 10 juillet 2024</div>
  </header>

  <!-- ── PANEL ── -->
  <aside id="panel">
    <button id="panel-close" title="Fermer"></button>

    <div id="video-wrap">
      <video id="player" playsinline preload="auto"></video>
      <div id="video-toolbar">
        <button id="btn-immersive" title="Mode immersif" style="display:none">⤢</button>
      </div>
    </div>

    <div id="panel-date">
      <span id="date-day"></span>
      <span id="date-month"></span>
      <span id="date-year">2024</span>
      <span id="date-time"></span>
    </div>
  </aside>

  <!-- ── MOBILE LANDSCAPE ── -->
  <div id="mobile-title-bar"><span>NORDKAPP</span></div>
  <div id="mobile-toggle">
    <button class="mob-tab active" id="mob-btn-video">Vidéo</button>
    <button class="mob-tab" id="mob-btn-photos">Photos</button>
  </div>
  <div id="mobile-left"></div>

  <!-- ── VIDEO STAGE (mode immersif) ── -->
  <div id="video-stage">
    <div id="stage-controls">
      <button id="stage-rate-btn">1×</button>
      <button id="btn-exit-immersive">✕</button>
    </div>
  </div>

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" hidden>
    <div id="lightbox-backdrop"></div>
    <button id="lightbox-close">✕</button>
    <div id="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="">
    </div>
    <div id="lb-toolbar">
      <button id="lightbox-prev">&#10094;</button>
      <span id="lb-counter" hidden></span>
      <button id="lb-download" title="Télécharger l'original">&#8681;</button>
      <button id="lightbox-next">&#10095;</button>
    </div>
    <div id="lb-progress"><div id="lb-progress-bar"></div></div>
  </div>

  <!-- ── TIMELINE ── -->
  <div id="bottom-bar">
    <div id="timeline-bar">
      <span class="tl-edge-label">17 juin</span>
      <div id="timeline-wrap">
        <div id="timeline-cities-row"></div>
        <div id="timeline-slider-wrap">
          <input id="timeline-input" type="range" min="0" max="1" step="1" value="0" autocomplete="off">
          <div id="timeline-thumb-label"></div>
        </div>
      </div>
      <span class="tl-edge-label">10 juil.</span>
    </div>
  </div>

  <video id="preloader" preload="auto" style="display:none"></video>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.vectorgrid@1.3.0/dist/Leaflet.VectorGrid.bundled.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="app.js?v=1774805058"></script>
</body>
</html>
